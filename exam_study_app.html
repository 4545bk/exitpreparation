<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AAU Exit Exam — Zerusha's Study HQ</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0a0c10;
      --surface: #111318;
      --surface2: #181c24;
      --border: #1e2330;
      --border2: #252d3d;
      --accent: #4f8ef7;
      --accent2: #6c63ff;
      --green: #22c55e;
      --yellow: #f59e0b;
      --red: #ef4444;
      --text: #e8eaf0;
      --text2: #8891a8;
      --text3: #4a5268;
      --mono: 'Space Mono', monospace;
      --sans: 'Sora', sans-serif;
      --radius: 10px;
      --radius-lg: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column
    }

    /* scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px
    }

    ::-webkit-scrollbar-track {
      background: var(--bg)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px
    }

    /* ── HEADER ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100
    }

    .logo {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent);
      letter-spacing: .04em
    }

    .logo span {
      color: var(--text3)
    }

    .header-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px
    }

    .countdown {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--yellow);
      letter-spacing: .06em
    }

    .date-now {
      font-size: 11px;
      color: var(--text3)
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .overall-pct {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 700;
      color: var(--accent)
    }

    .overall-label {
      font-size: 10px;
      color: var(--text3);
      text-align: right
    }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      flex: 1;
      height: calc(100vh - 57px)
    }

    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column
    }

    .main {
      flex: 1;
      overflow-y: auto;
      padding: 20px
    }

    /* ── SIDEBAR ── */
    .sidebar-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border)
    }

    .sidebar-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 8px
    }

    .overall-bar-wrap {
      margin-bottom: 8px
    }

    .overall-bar {
      height: 5px;
      background: var(--border2);
      border-radius: 3px;
      overflow: hidden
    }

    .overall-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 3px;
      transition: width .5s ease
    }

    .stats-mini {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text3);
      margin-top: 4px
    }

    .day-list {
      flex: 1;
      padding: 8px
    }

    .day-item {
      border-radius: var(--radius);
      margin-bottom: 3px;
      cursor: pointer;
      transition: background .15s;
      overflow: hidden
    }

    .day-item:hover .day-item-head {
      background: var(--surface2)
    }

    .day-item-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: var(--radius)
    }

    .day-item-head.active {
      background: var(--surface2);
      border-left: 2px solid var(--accent)
    }

    .day-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0
    }

    .dot-today {
      background: #1a2a4a;
      color: var(--accent);
      border: 1.5px solid var(--accent)
    }

    .dot-future {
      background: var(--surface2);
      color: var(--text3);
      border: 1.5px solid var(--border2)
    }

    .dot-done {
      background: #0f2d1a;
      color: var(--green);
      border: 1.5px solid var(--green)
    }

    .dot-review {
      background: #2d1f0a;
      color: var(--yellow);
      border: 1.5px solid var(--yellow)
    }

    .day-info {
      flex: 1;
      min-width: 0
    }

    .day-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .day-theme {
      font-size: 10px;
      color: var(--text3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .day-pct-small {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text3);
      flex-shrink: 0
    }

    /* ── TIMER ── */
    .timer-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 16px
    }

    .timer-display {
      font-family: var(--mono);
      font-size: 36px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: .02em;
      min-width: 90px
    }

    .timer-display.running {
      color: var(--accent)
    }

    .timer-display.break-time {
      color: var(--green)
    }

    .timer-right {
      flex: 1
    }

    .timer-mode-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      flex-wrap: wrap
    }

    .tmode {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text2);
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      cursor: pointer;
      transition: all .15s
    }

    .tmode.active {
      background: #0f1d3a;
      color: var(--accent);
      border-color: var(--accent)
    }

    .timer-btns {
      display: flex;
      gap: 6px
    }

    .tbtn {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all .15s
    }

    .tbtn:hover {
      background: var(--border2)
    }

    .tbtn.primary {
      background: #0f1d3a;
      border-color: var(--accent);
      color: var(--accent)
    }

    .tbtn.primary:hover {
      background: #152444
    }

    .session-dots {
      display: flex;
      gap: 5px;
      margin-top: 8px;
      align-items: center
    }

    .sdot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border2);
      border: 1.5px solid var(--border2);
      transition: all .3s
    }

    .sdot.done {
      background: var(--accent);
      border-color: var(--accent)
    }

    .timer-msg {
      font-size: 11px;
      color: var(--text3);
      margin-left: 6px
    }

    /* ── DAY CONTENT ── */
    .day-header-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      margin-bottom: 16px
    }

    .day-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px
    }

    .day-big-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3
    }

    .day-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      flex-shrink: 0;
      margin-top: 3px;
      font-family: var(--mono);
      letter-spacing: .04em
    }

    .badge-today {
      background: #0f1d3a;
      color: var(--accent);
      border: 1px solid var(--accent)
    }

    .badge-future {
      background: var(--surface2);
      color: var(--text3);
      border: 1px solid var(--border2)
    }

    .badge-done {
      background: #0a2016;
      color: var(--green);
      border: 1px solid var(--green)
    }

    .badge-review {
      background: #2a1800;
      color: var(--yellow);
      border: 1px solid var(--yellow)
    }

    .day-progress-row {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .day-prog-bar {
      flex: 1;
      height: 6px;
      background: var(--border2);
      border-radius: 3px;
      overflow: hidden
    }

    .day-prog-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width .4s
    }

    .day-prog-pct {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      min-width: 36px;
      text-align: right
    }

    /* ── ADD TOPIC ── */
    .add-topic-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px
    }

    .add-topic-row input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      padding: 8px 12px;
      border-radius: var(--radius);
      outline: none;
      transition: border .15s
    }

    .add-topic-row input:focus {
      border-color: var(--accent)
    }

    .add-topic-row input::placeholder {
      color: var(--text3)
    }

    .add-topic-row select {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text2);
      font-family: var(--sans);
      font-size: 12px;
      padding: 8px 10px;
      border-radius: var(--radius);
      outline: none;
      cursor: pointer
    }

    .addbtn {
      background: #0f1d3a;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s
    }

    .addbtn:hover {
      background: #152444
    }

    /* ── SESSION SECTION ── */
    .session-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 12px;
      overflow: hidden
    }

    .session-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .session-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: .06em
    }

    .session-count {
      font-size: 10px;
      color: var(--text3);
      font-family: var(--mono)
    }

    .topic-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 16px;
      border-bottom: 1px solid var(--border);
      transition: background .1s
    }

    .topic-row:last-child {
      border-bottom: none
    }

    .topic-row:hover {
      background: var(--surface2)
    }

    .chk {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1.5px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
      transition: all .15s;
      background: transparent
    }

    .chk:hover {
      border-color: var(--accent)
    }

    .chk.on {
      background: var(--green);
      border-color: var(--green)
    }

    .chk svg {
      display: none
    }

    .chk.on svg {
      display: block
    }

    .topic-text {
      flex: 1;
      font-size: 13px;
      color: var(--text);
      line-height: 1.5;
      cursor: pointer
    }

    .topic-text.done {
      color: var(--text3);
      text-decoration: line-through
    }

    .conf-dots {
      display: flex;
      gap: 3px;
      flex-shrink: 0;
      margin-top: 3px
    }

    .cd {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1.5px solid var(--border2);
      cursor: pointer;
      transition: all .15s
    }

    .cd:hover {
      transform: scale(1.3)
    }

    .cd.r {
      background: var(--red);
      border-color: var(--red)
    }

    .cd.y {
      background: var(--yellow);
      border-color: var(--yellow)
    }

    .cd.g {
      background: var(--green);
      border-color: var(--green)
    }

    .del-btn {
      background: transparent;
      border: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 14px;
      padding: 0 4px;
      opacity: 0;
      transition: opacity .15s;
      flex-shrink: 0;
      margin-top: 1px
    }

    .topic-row:hover .del-btn {
      opacity: 1
    }

    .del-btn:hover {
      color: var(--red)
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 32px 20px;
      color: var(--text3);
      font-size: 13px
    }

    .empty-icon {
      font-size: 32px;
      margin-bottom: 8px;
      opacity: .4
    }

    /* ── LEGEND ── */
    .legend {
      display: flex;
      gap: 14px;
      margin-bottom: 14px;
      flex-wrap: wrap
    }

    .leg {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text3)
    }

    .leg-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0
    }

    /* ── MOBILE ── */
    @media(max-width:700px) {
      .layout {
        flex-direction: column;
        height: auto
      }

      .sidebar {
        width: 100%;
        min-width: 0;
        height: auto;
        max-height: 200px;
        border-right: none;
        border-bottom: 1px solid var(--border)
      }

      .main {
        padding: 12px
      }

      .timer-card {
        flex-direction: column;
        gap: 10px
      }

      .timer-display {
        font-size: 28px
      }
    }

    /* ── ANIMATIONS ── */
    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .5
      }
    }

    .running-pulse {
      animation: pulse 1.5s infinite
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .fade-in {
      animation: fadeIn .25s ease forwards
    }

    /* ── NOTIFICATION BAR ── */
    .notif {
      position: fixed;
      top: 60px;
      right: 16px;
      background: var(--surface);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 12px;
      padding: 8px 14px;
      border-radius: var(--radius);
      z-index: 999;
      font-family: var(--mono);
      opacity: 0;
      transform: translateY(-8px);
      transition: all .3s;
      pointer-events: none
    }

    .notif.show {
      opacity: 1;
      transform: none
    }

    /* ── DETAILED LESSON TAB VIEW ── */
    .view-mode-tabs {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 4px;
      border-radius: var(--radius);
      margin-bottom: 16px;
      gap: 4px;
    }

    .view-tab {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text2);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: calc(var(--radius) - 2px);
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .view-tab:hover {
      color: var(--text);
      background: var(--surface2);
    }

    .view-tab.active {
      background: var(--border2);
      color: var(--accent);
    }

    .lesson-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      transition: border-color 0.2s ease;
    }

    .lesson-card:hover {
      border-color: var(--border2);
    }

    .lesson-card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .lesson-card-body {
      font-size: 13.5px;
      line-height: 1.7;
      color: var(--text);
    }

    .lesson-card-body p {
      margin-bottom: 12px;
    }

    .lesson-card-body ul, .lesson-card-body ol {
      margin-bottom: 16px;
      padding-left: 20px;
    }

    .lesson-card-body li {
      margin-bottom: 6px;
    }

    .lesson-card-body code {
      font-family: var(--mono);
      background: var(--surface2);
      color: var(--accent);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12.5px;
    }

    .lesson-card-body pre {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 14px;
      border-radius: var(--radius);
      overflow-x: auto;
      margin: 16px 0;
    }

    .lesson-card-body pre code {
      background: transparent;
      padding: 0;
      color: var(--text);
      font-size: 12px;
      display: block;
      line-height: 1.5;
    }

    .lesson-card-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 12.5px;
    }

    .lesson-card-body th, .lesson-card-body td {
      padding: 10px 12px;
      border: 1px solid var(--border);
      text-align: left;
    }

    .lesson-card-body th {
      background: var(--surface2);
      color: var(--accent);
      font-weight: 600;
    }

    .lesson-card-body tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .lesson-highlight {
      background: rgba(79, 142, 247, 0.06);
      border-left: 3px solid var(--accent);
      padding: 12px 16px;
      border-radius: 0 var(--radius) var(--radius) 0;
      margin: 16px 0;
    }

    .lesson-highlight.trap {
      background: rgba(239, 68, 68, 0.06);
      border-left: 3px solid var(--red);
    }

    .lesson-highlight.vs {
      background: rgba(108, 99, 255, 0.06);
      border-left: 3px solid var(--accent2);
    }

    .lesson-highlight.exam {
      background: rgba(34, 197, 94, 0.06);
      border-left: 3px solid var(--green);
    }

    .lesson-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 12px;
    }

    .cover-btn {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cover-btn:hover {
      background: var(--border2);
      border-color: var(--text3);
    }

    .cover-btn.covered {
      background: rgba(34, 197, 94, 0.15);
      border-color: var(--green);
      color: var(--green);
    }

    .fallback-msg {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 16px;
      border-radius: var(--radius-lg);
      text-align: center;
      font-size: 12px;
      margin-bottom: 16px;
    }

    /* ── HEADER VIEWS NAVIGATION ── */
    .logo-group {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-group {
      display: flex;
      gap: 8px;
      background: var(--surface2);
      padding: 4px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .nav-btn {
      background: transparent;

    function save() {
      try { localStorage.setItem('studyhq_days', JSON.stringify(days)); } catch (e) { }
    }
    function load() {
      try {
        var s = localStorage.getItem('studyhq_days');
        if (s) {
          var parsed = JSON.parse(s);
          // merge to keep new topics if any
          days = parsed;
        } else {
          days = JSON.parse(JSON.stringify(DEFAULT_DAYS));
        }
      } catch (e) { days = JSON.parse(JSON.stringify(DEFAULT_DAYS)); }
    }

    var days;
    load();
    var activeDay = 0;

    // ── TIMER ──
    var timerSecs = 25 * 60, timerRunning = false, timerInterval = null;
    var timerMode = 'focus';
    var sessionsComplete = 0;
    var modes = { focus: { s: 25 * 60, msg: 'Stay off your phone. You are studying.' }, short: { s: 5 * 60, msg: 'Stand up. Stretch. Rest your eyes.' }, long: { s: 15 * 60, msg: 'Eat something. Walk. You earned this.' } };

    function fmtTime(s) { var m = Math.floor(s / 60); var sc = s % 60; return (m < 10 ? '0' : '') + m + ':' + (sc < 10 ? '0' : '') + sc; }
    function setMode(m) {
      timerMode = m; clearInterval(timerInterval); timerRunning = false;
      timerSecs = modes[m].s;
      document.getElementById('timer-disp').textContent = fmtTime(timerSecs);
      document.getElementById('timer-disp').className = 'timer-display';
      document.getElementById('tbtn-start').textContent = '▶ Start';
      document.getElementById('timer-msg').textContent = modes[m].msg;
      ['focus', 'short', 'long'].forEach(function (x) { document.getElementById('tmode-' + x).classList.toggle('active', x === m); });
    }
    function toggleTimer() {
      if (timerRunning) {
        clearInterval(timerInterval); timerRunning = false;
        document.getElementById('tbtn-start').textContent = '▶ Resume';
        document.getElementById('timer-disp').classList.remove('running-pulse');
      } else {
        timerRunning = true;
        document.getElementById('tbtn-start').textContent = '⏸ Pause';
        document.getElementById('timer-disp').className = 'timer-display running running-pulse';
        if (timerMode === 'break-time') document.getElementById('timer-disp').className = 'timer-display break-time running-pulse';
        timerInterval = setInterval(function () {
          timerSecs--;
          document.getElementById('timer-disp').textContent = fmtTime(timerSecs);
          if (timerSecs <= 0) {
            clearInterval(timerInterval); timerRunning = false;
            document.getElementById('tbtn-start').textContent = '▶ Start';
            document.getElementById('timer-disp').classList.remove('running-pulse');
            if (timerMode === 'focus') {
              sessionsComplete = Math.min(sessionsComplete + 1, 4);
              for (var i = 0; i < 4; i++) { document.getElementById('sd' + i).classList.toggle('done', i < sessionsComplete); }
              if (sessionsComplete >= 4) {
                showNotif('🎉 4 sessions done! Take a long break!');
                sessionsComplete = 0;
                for (var i = 0; i < 4; i++) { setTimeout(function (ii) { return function () { document.getElementById('sd' + ii).classList.remove('done'); } }(i), 1500); }
              } else {
                showNotif('✓ Session done. Take a 5-min break.');
              }
              document.getElementById('timer-msg').textContent = 'Take a break — session complete!';
            } else {
              showNotif('⏰ Break over. Back to work!');
              document.getElementById('timer-msg').textContent = 'Break done — start next focus session.';
            }
          }
        }, 1000);
      }
    }
    function resetTimer() {
      clearInterval(timerInterval); timerRunning = false;
      timerSecs = modes[timerMode].s;
      document.getElementById('timer-disp').textContent = fmtTime(timerSecs);
      document.getElementById('timer-disp').className = 'timer-display';
      document.getElementById('tbtn-start').textContent = '▶ Start';
    }

    // ── NOTIF ──
    var notifTO = null;
    function showNotif(msg) {
      var el = document.getElementById('notif');
      el.textContent = msg; el.classList.add('show');
      clearTimeout(notifTO); notifTO = setTimeout(function () { el.classList.remove('show'); }, 3000);

    // ── STATS ──
    function totalTopics() { var n = 0; days.forEach(function (d) { d.sessions.forEach(function (s) { n += s.topics.length; }); }); return n; }
    function doneTopics() { var n = 0; days.forEach(function (d) { d.sessions.forEach(function (s) { s.topics.forEach(function (t) { if (t.done) n++; }); }); }); return n; }
    function dayPercent(di) {
      var t = 0, d = 0;
      days[di].sessions.forEach(function (s) { s.topics.forEach(function (tp) { t++; if (tp.done) d++; }); });
      return t > 0 ? Math.round(d / t * 100) : 0;
    }
    function updateStats() {
      var total = totalTopics(); var done = doneTopics();
      var pct = total > 0 ? Math.round(done / total * 100) : 0;
      document.getElementById('overall-bar-fill').style.width = pct + '%';
      document.getElementById('stat-done').textContent = done + ' topics done';
      document.getElementById('stat-total').textContent = 'of ' + total;
      document.getElementById('hdr-pct').textContent = pct + '%';
    }

    // ── COUNTDOWN ──
    function updateCountdown() {
      var now = new Date();
      var diff = EXAM_DATE - now;
      if (diff <= 0) { document.getElementById('countdown').textContent = 'EXAM DAY!'; return; }
      var days = Math.floor(diff / 86400000);
      var hrs = Math.floor((diff % 86400000) / 3600000);
      var mins = Math.floor((diff % 3600000) / 60000);
      var secs = Math.floor((diff % 60000) / 1000);
      document.getElementById('countdown').textContent =
        days + 'd ' + String(hrs).padStart(2, '0') + 'h ' + String(mins).padStart(2, '0') + 'm ' + String(secs).padStart(2, '0') + 's';
      var opts = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
      document.getElementById('date-now').textContent = now.toLocaleDateString('en-US', opts);
    }
    setInterval(updateCountdown, 1000); updateCountdown();

    function parseAndSanitizeQuestions(jsonText) {
      if (!jsonText || !jsonText.trim()) {
        throw new Error("Text area is empty. Please paste your JSON exam questions first.");
      }
      
      var cleanText = jsonText.trim();
      if (cleanText.indexOf('```') !== -1) {
        var match = cleanText.match(/```(?:json)?\s*([\s\S]*?)\s*```/);
        if (match && match[1]) {
          cleanText = match[1].trim();
        } else {
          cleanText = cleanText.replace(/```(?:json)?/g, '').replace(/```/g, '').trim();
        }
      }
      
      var startIdx = cleanText.indexOf('[');
      var endIdx = cleanText.lastIndexOf(']');
      if (startIdx === -1 || endIdx === -1) {
        throw new Error("Invalid format: Could not locate JSON array brackets ('[' and ']'). Make sure you paste a JSON array.");
      }
      
      var arrayData;
      try {
        arrayData = JSON.parse(cleanText.substring(startIdx, endIdx + 1));
      } catch (err) {
        throw new Error("JSON Parsing Error: " + err.message + ". Please verify the syntax is valid JSON.");
      }
      
      if (!Array.isArray(arrayData)) {
        throw new Error("Parsed data is not a JSON Array. The top-level structure must be an array: [ { ... }, { ... } ]");
      }
      
      if (arrayData.length === 0) {
        throw new Error("The pasted JSON array is empty. Please provide at least one question.");
      }
      
      var alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      var sanitized = arrayData.map(function(q, idx) {
        var number = q.number || (idx + 1);
        var text = q.text || q.question || q.q;
        if (!text) {
          throw new Error("Question at index " + idx + " is missing its 'text' or 'question' field.");
        }
        
        var rawChoices = q.choices || q.options || q.answers;
        if (!rawChoices) {
          throw new Error("Question #" + number + " is missing a 'choices' array.");
        }
        
        var formattedChoices = [];
        if (Array.isArray(rawChoices)) {
          formattedChoices = rawChoices.map(function(choice, cIdx) {
            if (typeof choice === 'string') {
              return {
                letter: alphabet.charAt(cIdx) || String(cIdx + 1),
                text: choice.trim()
              };
            } else if (typeof choice === 'object' && choice !== null) {
              var cText = choice.text || choice.choice || choice.option || choice.value || Object.values(choice)[0] || '';
              var cLetter = choice.letter || choice.label || choice.key || alphabet.charAt(cIdx);
              return {
                letter: String(cLetter).toUpperCase(),
                text: String(cText).trim()
              };
            }
            return { letter: alphabet.charAt(cIdx), text: String(choice) };
          });
        } else if (typeof rawChoices === 'object' && rawChoices !== null) {
          for (var key in rawChoices) {
            if (rawChoices.hasOwnProperty(key)) {
              formattedChoices.push({
                letter: String(key).toUpperCase(),
                text: String(rawChoices[key]).trim()
              });
            }
          }
        } else {
          throw new Error("Question #" + number + " has an invalid 'choices' format. Must be an array or key-value object.");
        }
        
        if (formattedChoices.length < 2) {
          throw new Error("Question #" + number + " must have at least 2 choices.");
        }
        
        var correctVal = q.correctIndex !== undefined ? q.correctIndex : (q.correct_index !== undefined ? q.correct_index : (q.correctAnswer !== undefined ? q.correctAnswer : (q.correct_answer !== undefined ? q.correct_answer : (q.answer !== undefined ? q.answer : q.key))));
        if (correctVal === undefined) {
          throw new Error("Question #" + number + " is missing the correct answer field (e.g. 'correctIndex' or 'correctAnswer').");
        }
        
        var correctIdx = -1;
        var isIndexField = q.correctIndex !== undefined || q.correct_index !== undefined;
        
        if (typeof correctVal === 'number') {
          if (isIndexField) {
            if (correctVal >= 0 && correctVal < formattedChoices.length) {
              correctIdx = correctVal;
            }
          } else {
            if (correctVal > 0 && correctVal <= formattedChoices.length) {
              correctIdx = correctVal - 1;
            } else if (correctVal >= 0 && correctVal < formattedChoices.length) {
              correctIdx = correctVal;
            }
          }
        } else {
          var cleanVal = String(correctVal).trim().toLowerCase();
          var numVal = parseInt(cleanVal, 10);
          if (!isNaN(numVal)) {
            if (isIndexField) {
              if (numVal >= 0 && numVal < formattedChoices.length) {
                correctIdx = numVal;
              }
            } else {
              if (numVal > 0 && numVal <= formattedChoices.length) {
                correctIdx = numVal - 1;
              } else if (numVal >= 0 && numVal < formattedChoices.length) {
                correctIdx = numVal;
              }
            }
          } else {
            for (var cIdx = 0; cIdx < formattedChoices.length; cIdx++) {
              var c = formattedChoices[cIdx];
              if (c.letter.toLowerCase() === cleanVal || cleanVal.indexOf(c.letter.toLowerCase()) === 0) {
                correctIdx = cIdx;
                break;
              }
            }
            if (correctIdx === -1) {
              for (var cIdx = 0; cIdx < formattedChoices.length; cIdx++) {
                var c = formattedChoices[cIdx];
                if (c.text.toLowerCase() === cleanVal || cleanVal.indexOf(c.text.toLowerCase()) !== -1 || c.text.toLowerCase().indexOf(cleanVal) !== -1) {
                  correctIdx = cIdx;
                  break;
                }
              }
            }
          }
        }
        
        if (correctIdx === -1) {
          var letterMap = { a: 0, b: 1, c: 2, d: 3, e: 4, f: 5, g: 6, h: 7 };
          var standardLetter = String(correctVal).trim().toLowerCase().charAt(0);
          if (letterMap[standardLetter] !== undefined && letterMap[standardLetter] < formattedChoices.length) {
            correctIdx = letterMap[standardLetter];
          } else {
            throw new Error("Could not map correct answer value '" + correctVal + "' to any choices for Question #" + number + ".");
          }
        }
        
        var explanation = q.explanation || q.exp || q.rationale || "No explanation provided for this question.";
        var id = q.id || ("q_pasted_" + idx + "_" + Date.now());
        
        return {
          id: id,
          number: number,
          text: text.trim(),
          choices: formattedChoices,
          correctIndex: correctIdx,
          explanation: explanation.trim()
        };
      });
      
      return sanitized;
    }

      clearInterval(sim.timerInterval);
      sim.timerInterval = setInterval(function() {
        sim.timeLeft--;
        var timerEl = document.getElementById('sim-timer');
        if (timerEl) {
          timerEl.textContent = '⏱️ ' + formatSimTime(sim.timeLeft);
          if (sim.timeLeft < 300) {
            timerEl.style.borderColor = 'var(--red)';
            timerEl.style.color = 'var(--red)';
          }
        }
        if (sim.timeLeft <= 0) {
          clearInterval(sim.timerInterval);
          submitSimulator();
        }
      }, 1000);
    }

    function formatSimTime(secs) {
      var h = Math.floor(secs / 3600);
      var m = Math.floor((secs % 3600) / 60);
      var s = secs % 60;
      var mm = String(m).padStart(2, '0');
      var ss = String(s).padStart(2, '0');
      return h > 0 ? h + ':' + mm + ':' + ss : mm + ':' + ss;
    }

    function renderSimulator() {
      if (sim.questions.length > 0) {
        if (sim.submitted) {
          renderSimulatorReport();
        } else {
          renderSimulatorActive();
        }
      } else {
        renderSimulatorStart();
      }
    }

    function renderSimulatorStart() {
      var html = '<div class="fade-in" style="padding:8px 4px;">';
      html += '<div class="day-header-card" style="margin-bottom:20px; border-left:3px solid var(--accent2)">';
      html += '<div class="day-big-title">Exit Exam Simulator 📝</div>';
      html += '<p style="font-size:12px; color:var(--text2); margin-top:4px;">Upload any academic assessment PDF and convert it instantly into an interactive, time-boxed exam practice simulation.</p>';
      html += '</div>';

      html += '<div class="lesson-card" style="padding:24px;">';
      html += '<h3 style="color:var(--text); margin-bottom:16px; font-size:14px; font-weight:600;">Select Exam PDF to Practice</h3>';
      
      html += '<div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px;">';
      html += '<select id="sim-pdf-select" style="flex:1; min-width:200px; background:var(--surface2); border:1px solid var(--border2); color:var(--text); padding:10px 14px; border-radius:var(--radius); outline:none; font-family:var(--sans);">';
      html += '<option value="">💡 Standalone Mock Exam (Offline Fallback)</option>';
      sim.pdfs.forEach(function(pdf) {
        html += '<option value="' + pdf.filename + '"' + (pdf.filename === sim.activeFile ? ' selected' : '') + '>📁 ' + pdf.filename + ' (' + Math.round(pdf.size / 1024) + ' KB)</option>';
      });
      var savedLocal = JSON.parse(localStorage.getItem('saved_custom_exams') || '[]');
      savedLocal.forEach(function(localExam) {
        var isSel = ('local:' + localExam.name) === sim.activeFile;
        html += '<option value="local:' + localExam.name + '"' + (isSel ? ' selected' : '') + '>📝 ' + localExam.name + ' (' + localExam.questions.length + ' questions - Saved Paste)</option>';
      });
      html += '</select>';
      
      html += '<button class="addbtn" onclick="sim.activeFile = document.getElementById(\'sim-pdf-select\').value; launchSimulator();" style="background:linear-gradient(135deg, var(--accent), var(--accent2)); border:none; color:white; padding:10px 20px; font-size:13px;">🚀 Launch Simulator</button>';
      html += '</div>';

      html += '<div style="border-top:1px solid var(--border); padding-top:20px;">';
      html += '<h4 style="font-size:12px; color:var(--text2); margin-bottom:10px; margin-top:15px;">Upload New Exam PDF</h4>';
      html += '<div style="border:2px dashed var(--border2); border-radius:var(--radius-lg); padding:24px; text-align:center; background:var(--surface2);">';
      html += '<p style="font-size:12.5px; color:var(--text3); margin-bottom:12px;">Drag and drop your model exam or practice PDF here</p>';
      html += '<label class="cover-btn" style="display:inline-flex; align-items:center; gap:8px; border-color:var(--accent); color:var(--accent); margin:0 auto; cursor:pointer;">';
      html += '<span>📁 Browse Files</span>';
      html += '<input type="file" accept=".pdf" onchange="uploadSimulatorPdf(event)" style="display:none;">';
      html += '</label>';
      html += '</div>';
      html += '</div>';
      html += '</div>';

      html += '<div class="lesson-card" style="padding:24px; margin-top:20px;">';
      html += '<h3 style="color:var(--text); margin-bottom:8px; font-size:14px; font-weight:600;">Option 2: Paste Exam JSON (Gemini / Claude Fallback)</h3>';
      html += '<p style="font-size:12px; color:var(--text2); margin-bottom:16px;">If PDF upload fails or backend is offline, you can copy the text from your exam PDF, ask an AI (like Gemini or Claude) to format it into JSON, and paste it here.</p>';
      
      html += '<button id="sim-prompt-btn" onclick="toggleSimPromptInstructions()" style="background:none; border:1px solid var(--border2); color:var(--accent); padding:6px 12px; border-radius:var(--radius); cursor:pointer; font-size:12px; font-family:var(--mono); margin-bottom:16px; display:flex; align-items:center; gap:6px; transition:all 0.2s;">👉 Show LLM Prompt Instructions</button>';
      
      html += '<div id="sim-prompt-panel" style="display:none; background:var(--surface2); border:1px solid var(--border2); border-radius:var(--radius); padding:16px; margin-bottom:16px; position:relative;">';
      html += '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">';
      html += '<span style="font-size:11px; font-family:var(--mono); color:var(--text3);">COPY THIS PROMPT FOR GEMINI:</span>';
      html += '<button onclick="copySimPromptTemplate()" style="background:var(--accent); border:none; color:white; padding:4px 10px; border-radius:4px; font-size:11px; font-weight:600; cursor:pointer;">📋 Copy Prompt</button>';
      html += '</div>';
      html += '<pre style="font-family:var(--mono); font-size:11px; color:var(--text2); white-space:pre-wrap; background:#0d0f14; padding:12px; border-radius:6px; max-height:200px; overflow-y:auto; border:1px solid var(--border);">' + GEMINI_PROMPT_TEMPLATE.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") + '</pre>';
      html += '</div>';
      
      html += '<textarea id="sim-json-textarea" placeholder=\'Paste your JSON exam array here... e.g. [{"number": 1, "text": "...", "choices": [...], "correctIndex": 0}]\' style="width:100%; height:140px; background:var(--surface2); border:1px solid var(--border2); color:var(--text); padding:12px; border-radius:var(--radius); outline:none; font-family:var(--mono); font-size:12px; resize:vertical; margin-bottom:10px;">' + sim.pastedJson + '</textarea>';
      
      html += '<div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; background:var(--surface); border:1px solid var(--border); padding:12px 16px; border-radius:var(--radius); margin-bottom:16px;">';
      html += '<span style="font-size:12.5px; color:var(--text2);">💾 Custom Exam Name (optional):</span>';
      html += '<input id="sim-local-name-input" type="text" placeholder="Enter custom exam name (or leave empty to auto-generate)..." style="flex:1; min-width:200px; background:var(--surface2); border:1.5px solid var(--border2); color:var(--text); padding:8px 12px; border-radius:var(--radius); font-size:12px; outline:none; font-family:var(--sans);">';
      html += '</div>';
      
      html += '<div id="sim-json-error" style="display:none; color:var(--red); font-size:12px; background:rgba(239, 68, 68, 0.08); border:1px solid var(--red); padding:10px 14px; border-radius:var(--radius); margin-bottom:14px; font-family:var(--mono);"></div>';
      
      html += '<button class="addbtn" onclick="sim.pastedJson = document.getElementById(\'sim-json-textarea\').value; launchPastedSimulator();" style="background:linear-gradient(135deg, var(--accent2), #8a3ffc); border:none; color:white; padding:10px 20px; font-size:13px; width:100%; display:flex; justify-content:center; align-items:center; font-weight:600;">⚡ Load & Run Exam Simulator</button>';
      html += '</div>';

      html += '</div>';

      document.getElementById('day-content').innerHTML = html;
    }

    function renderSimulatorActive() {
      var q = sim.questions[sim.currentIdx];
      var answered = sim.answers[sim.currentIdx] !== undefined;
      var selected = sim.answers[sim.currentIdx];

      var total = sim.questions.length;
      var answeredCount = Object.keys(sim.answers).length;

      var html = '<div class="fade-in" style="display:flex; flex-direction:column; gap:12px;">';
      
      // Control bar
      html += '<div style="display:flex; justify-content:space-between; align-items:center; background:var(--surface); border:1px solid var(--border); padding:12px 18px; border-radius:var(--radius-lg);">';
      html += '<div style="display:flex; flex-direction:column;">';
      html += '<span style="font-size:12px; font-weight:700; color:var(--text);">Practice Mode: ' + (sim.activeFile || 'Offline Standalone Mock') + '</span>';
      html += '<span style="font-size:10.5px; color:var(--text3);">Answered ' + answeredCount + ' of ' + total + ' questions</span>';
      html += '</div>';
      html += '<div style="display:flex; align-items:center; gap:16px;">';
      html += '<div id="sim-timer" style="font-family:var(--mono); font-size:18px; font-weight:700; color:var(--yellow); background:var(--surface2); padding:4px 12px; border-radius:20px; border:1.5px solid var(--border2);">⏱️ ' + formatSimTime(sim.timeLeft) + '</div>';
      html += '<button class="cover-btn covered" onclick="submitSimulator()" style="border-color:var(--green); color:var(--green);">Submit Exam</button>';
      html += '</div>';
      html += '</div>';

      html += '<div style="display:flex; gap:16px; flex-wrap:wrap;">';
      
      // Question Card
      html += '<div class="lesson-card" style="flex:2; min-width:300px; margin-bottom:0;">';
      html += '<div style="font-size:11px; font-family:var(--mono); color:var(--accent); margin-bottom:10px; font-weight:600;">QUESTION ' + (sim.currentIdx + 1) + ' OF ' + total + '</div>';
      html += '<h2 style="font-size:14.5px; font-weight:600; color:var(--text); line-height:1.6; margin-bottom:20px;">' + q.text + '</h2>';

      html += '<div style="display:flex; flex-direction:column; gap:10px; margin-bottom:20px;">';
      q.choices.forEach(function(choice, idx) {
        var letter = choice.letter;
        var text = choice.text;

        var btnBg = 'var(--surface2)';
        var btnBorder = 'var(--border2)';
        var btnColor = 'var(--text)';
        var dotBg = 'var(--border2)';
        var badgeSymbol = letter;

        if (answered) {
          if (idx === q.correctIndex) {
            btnBorder = 'var(--green)';
            btnBg = 'rgba(34, 197, 94, 0.08)';
            btnColor = 'var(--green)';
            dotBg = 'var(--green)';
            badgeSymbol = '✓';
          } else if (selected === idx) {
            btnBorder = 'var(--red)';
            btnBg = 'rgba(239, 68, 68, 0.08)';
            btnColor = 'var(--red)';
            dotBg = 'var(--red)';
            badgeSymbol = '✕';
          }
        }

        html += '<button onclick="selectSimulatorChoice(' + idx + ')" ' + (answered ? 'disabled' : '') + ' style="display:flex; align-items:center; gap:12px; padding:12px 16px; background:' + btnBg + '; border:1.5px solid ' + btnBorder + '; border-radius:var(--radius); cursor:' + (answered ? 'default' : 'pointer') + '; text-align:left; width:100%; color:' + btnColor + '; font-family:var(--sans); font-size:13px; transition:all 0.15s ease;">';
        html += '<span style="width:24px; height:24px; border-radius:50%; background:' + dotBg + '; color:white; font-weight:700; display:flex; align-items:center; justify-content:center; font-size:11px; flex-shrink:0;">' + badgeSymbol + '</span>';
        html += '<span>' + text + '</span>';
        html += '</button>';
      });
      html += '</div>';

      if (answered) {
        var hlClass = selected === q.correctIndex ? 'exam' : 'trap';
        var hlTitle = selected === q.correctIndex ? '✓ Correct Answer' : '✕ Incorrect Answer';
        html += '<div class="lesson-highlight ' + hlClass + '" style="margin-top:20px;">';
        html += '<div style="font-weight:700; font-size:12px; margin-bottom:4px; text-transform:uppercase; letter-spacing:0.04em;">' + hlTitle + '</div>';
        html += '<p style="font-size:13px; line-height:1.6;"><strong>Explanation: </strong> ' + q.explanation + '</p>';
        html += '</div>';
      }

      html += '<div style="display:flex; justify-content:space-between; margin-top:24px; border-top:1px solid var(--border); padding-top:16px;">';
      html += '<button class="cover-btn" ' + (sim.currentIdx === 0 ? 'disabled' : '') + ' onclick="prevSimulatorQ()">⬅ Previous</button>';
      html += '<button class="cover-btn" ' + (sim.currentIdx === total - 1 ? 'disabled' : '') + ' onclick="nextSimulatorQ()">Next ➡</button>';
      html += '</div>';
      html += '</div>';

      // Sidebar navigator map
      html += '<div class="lesson-card" style="flex:1; min-width:220px; display:flex; flex-direction:column; margin-bottom:0;">';
      html += '<h3 style="font-size:12px; font-weight:700; color:var(--text2); margin-bottom:14px; text-transform:uppercase; letter-spacing:0.05em;">Question Map</h3>';
      html += '<div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(36px, 1fr)); gap:8px; overflow-y:auto; max-height:360px; padding-right:4px;">';
      
      sim.questions.forEach(function(sq, idx) {
        var selection = sim.answers[idx];
        var isAnswered = selection !== undefined;
        var isCorrect = isAnswered && selection === sq.correctIndex;

        var bBorder = 'var(--border2)';
        var bBg = 'var(--surface2)';
        var bColor = 'var(--text2)';

        if (idx === sim.currentIdx) {
          bBorder = 'var(--accent)';
          bColor = 'var(--accent)';
          bBg = 'rgba(79, 142, 247, 0.08)';
        } else if (isAnswered) {
          if (isCorrect) {
            bBorder = 'var(--green)';
            bBg = 'rgba(34, 197, 94, 0.15)';
            bColor = 'var(--green)';
          } else {
            bBorder = 'var(--red)';
            bBg = 'rgba(239, 68, 68, 0.15)';
            bColor = 'var(--red)';
          }
        }

        html += '<div onclick="sim.currentIdx = ' + idx + '; renderSimulatorActive();" style="height:36px; border-radius:8px; font-family:var(--mono); font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; cursor:pointer; border:1.5px solid ' + bBorder + '; background:' + bBg + '; color:' + bColor + '; transition:all 0.15s;">' + (idx + 1) + '</div>';
      });

      html += '</div>';

      html += '<div style="border-top:1px solid var(--border); margin-top:20px; padding-top:14px; font-size:11px; color:var(--text3); display:flex; flex-direction:column; gap:6px;">';
      html += '<div style="display:flex; align-items:center; gap:8px;"><span style="width:10px; height:10px; border-radius:2px; background:rgba(34, 197, 94, 0.15); border:1px solid var(--green);"></span><span>Correct Answer</span></div>';
      html += '<div style="display:flex; align-items:center; gap:8px;"><span style="width:10px; height:10px; border-radius:2px; background:rgba(239, 68, 68, 0.15); border:1px solid var(--red);"></span><span>Incorrect Answer</span></div>';
      html += '<div style="display:flex; align-items:center; gap:8px;"><span style="width:10px; height:10px; border-radius:2px; background:rgba(79, 142, 247, 0.08); border:1px solid var(--accent);"></span><span>Active Question</span></div>';
      html += '</div>';

      html += '<button class="cover-btn" onclick="exitSimulator()" style="margin-top:20px; border-color:var(--border2); color:var(--text3); justify-content:center;">🚪 Quit Exam</button>';
      html += '</div>';

      html += '</div></div>';

      document.getElementById('day-content').innerHTML = html;
    }

    function selectSimulatorChoice(idx) {
      if (sim.submitted) return;
      if (sim.answers[sim.currentIdx] !== undefined) return;
      sim.answers[sim.currentIdx] = idx;
      renderSimulatorActive();
    }
    function prevSimulatorQ() {
      if (sim.currentIdx > 0) {
        sim.currentIdx--;
        renderSimulatorActive();
      }
    }
    function nextSimulatorQ() {
      if (sim.currentIdx < sim.questions.length - 1) {
        sim.currentIdx++;
        renderSimulatorActive();
      }
    }

    function submitSimulator() {
      clearInterval(sim.timerInterval);
      sim.timeTaken = sim.duration - sim.timeLeft;
      sim.submitted = true;
      renderSimulatorReport();
      showNotif('Exam evaluated successfully! Check report card 📊');
    }

    function exitSimulator() {
      sim.questions = [];
      sim.answers = {};
      sim.submitted = false;
      clearInterval(sim.timerInterval);
      setView('simulator');
    }

    function renderSimulatorReport() {
      var total = sim.questions.length;
      var correct = 0;
      sim.questions.forEach(function(q, idx) {
        if (sim.answers[idx] === q.correctIndex) correct++;
      });
      var pct = total > 0 ? Math.round((correct / total) * 100) : 0;
      var passed = pct >= 50;

      var html = '<div class="fade-in" style="padding:8px 4px;">';
      html += '<div class="day-header-card" style="text-align:center; padding:30px 20px;">';
      html += '<div style="font-size:13px; font-family:var(--mono); color:var(--text3); text-transform:uppercase; letter-spacing:0.1em;">ASSESSMENT SUMMARY REPORT</div>';
      html += '<div style="font-size:48px; font-weight:800; color:' + (passed ? 'var(--green)' : 'var(--red)') + '; margin:12px 0 4px;">' + pct + '%</div>';
      html += '<div style="display:inline-block; background:' + (passed ? 'rgba(34, 197, 94, 0.15)' : 'rgba(239, 68, 68, 0.15)') + '; color:' + (passed ? 'var(--green)' : 'var(--red)') + '; padding:4px 14px; border-radius:20px; font-weight:700; font-size:11px; letter-spacing:0.05em; text-transform:uppercase;">' + (passed ? 'PASSED STUDY METRIC' : 'FAILED STUDY METRIC') + '</div>';
      
      html += '<div style="display:flex; justify-content:center; gap:24px; margin-top:20px; color:var(--text2); font-size:13px;">';
      html += '<div><span style="color:var(--text); font-weight:600;">' + correct + '</span> of ' + total + ' Correct</div>';
      html += '<div>Time Taken: <span style="color:var(--text); font-weight:600;">' + formatSimTime(sim.timeTaken) + '</span></div>';
      html += '</div></div>';

      // Breakdown by subjects
      var categories = {
        "Networking & Protocols": { total: 0, correct: 0, keywords: ['cidr', 'ip', 'mac', 'subnet', 'tcp', 'udp', 'osi', 'router', 'protocol', 'port', 'dns', 'dhcp', 'rip', 'ospf', 'bgp', 'nat', 'arp'] },
        "Data Structures & Algorithms": { total: 0, correct: 0, keywords: ['binary search', 'sort', 'linked list', 'tree', 'bst', 'heap', 'complexity', 'graph', 'stack', 'queue', 'array', 'big-o', 'search'] },
        "Database Management": { total: 0, correct: 0, keywords: ['database', 'sql', 'join', 'key', 'normalization', 'transaction', 'acid', 'composite', '1nf', '2nf', '3nf', 'bcnf', 'nosql', 'mongodb'] },
        "Software Engineering & PM": { total: 0, correct: 0, keywords: ['agile', 'scrum', 'waterfall', 'sdlc', 'uml', 'testing', 'spiral', 'cohesion', 'coupling', 'solid', 'wbs', 'critical path', 'float', 'cpi', 'spi'] },
        "AI, Security & Other Core": { total: 0, correct: 0, keywords: [] }
      };

      sim.questions.forEach(function(q, idx) {
        var text = q.text.toLowerCase();
        var selection = sim.answers[idx];
        var isCorrect = selection === q.correctIndex;
        var categorized = false;

        for (var name in categories) {
          var cat = categories[name];
          if (cat.keywords.length > 0 && cat.keywords.some(function(kw) { return text.includes(kw); })) {
            cat.total++;
            if (isCorrect) cat.correct++;
            categorized = true;
            break;
          }
        }
        if (!categorized) {
          categories["AI, Security & Other Core"].total++;
          if (isCorrect) categories["AI, Security & Other Core"].correct++;
        }
      });

      html += '<div class="lesson-card" style="padding:20px 24px;">';
      html += '<h3 style="font-size:14px; font-weight:600; color:var(--text); margin-bottom:16px; border-bottom:1px solid var(--border); padding-bottom:10px;">📊 Performance Breakdown by Subject Area</h3>';
      html += '<div style="display:flex; flex-direction:column; gap:16px;">';
      
      for (var name in categories) {
        var cat = categories[name];
        if (cat.total > 0) {
          var subPct = Math.round((cat.correct / cat.total) * 100);
          var color = subPct >= 75 ? 'var(--green)' : subPct >= 50 ? 'var(--yellow)' : 'var(--red)';
          html += '<div>';
          html += '<div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:6px;">';
          html += '<span style="color:var(--text2); font-weight:500;">' + name + '</span>';
          html += '<span style="color:var(--accent); font-weight:700;">' + subPct + '% (' + cat.correct + '/' + cat.total + ')</span>';
          html += '</div>';
          html += '<div style="height:6px; background:var(--border2); border-radius:3px; overflow:hidden;">';
          html += '<div style="height:100%; width:' + subPct + '%; background:' + color + '; border-radius:3px;"></div>';
          html += '</div></div>';
        }
      }

      html += '</div>';

      html += '<div style="display:flex; gap:10px; margin-top:28px;">';
      html += '<button class="cover-btn" onclick="sim.submitted = false; sim.answers = {}; sim.currentIdx = 0; sim.timeLeft = sim.duration; startSimulatorTimer(); renderSimulatorActive();" style="flex:1; justify-content:center;">🔄 Retake Exam</button>';
      html += '<button class="cover-btn covered" onclick="exitSimulator()" style="flex:1; justify-content:center;">🚪 Exit Simulator</button>';
      html += '</div>';

      html += '</div></div>';

      document.getElementById('day-content').innerHTML = html;
    }

    // ── INIT ──
    buildSidebar();
    renderDayContent();
  </script>
</body>

</html>
